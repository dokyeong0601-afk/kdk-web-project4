<!DOCTYPE html>
<html>
<head>
    <title>7장 연습문제(flexbox 사용)</title>
    <style>
        .container {
            width: 1080px;
            margin: 0 auto;
            margin-bottom: 8px;
        }
        .left {
            width: 740px; height: 428px;
            background: red;
        }
        .right {
            width: 332px; height: 428px;
            background: blue;
        }
        .gnb {
            display: flex;
            background-color: green;
            padding: 8px 0;
        }
        .gnb li {
            list-style-type: none;
            padding-left:  16px;
        }
        .gnb li:first-child { padding-left: 0px; }
        .rank {
            list-style-type: none;
            display: flex;
            background-color: yellow;
            padding: 8px 0;
        }
        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .middle {
            display: flex;
            justify-content: space-between;
        }
        .footer {
            width: 1080px; height: 80px;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Logo</h1>
    </div>
    <div class="container top">
        <ul class="gnb">
            <li>메일</li>
            <li>카페</li>
            <li>블로그</li>
            <li>쇼핑</li>
            <li>사전</li>
            <li>뉴스</li>
            <li>증권</li>
            <li>부동산</li>
            <li>지도</li>
        </ul>
        <ul class="rank">
            <li>실시간 검색 순위</li>
        </ul>
    </div>
    <div class="container middle">
        <div class="left"></div>
        <div class="right"></div>
    </div>
    <div class="container middle">
        <div class="left"></div>
        <div class="right"></div>
    </div>
    <div class="container">
        <div class="footer"></div>
    </div>
</body>
</html>
